<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Afraz Alam</title>
    <!-- FAVICON -->
    <link rel="icon" href="./images/favicon-32x32.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    
    <link rel="stylesheet" href="./css/style.css">

    <style>
        .thank-you-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: url("./images/hero-bg-img.webp") no-repeat center center/cover;
            padding: 40px 20px;
            position: relative;
        }
        
        .thank-you-section::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.90);
            z-index: 1;
        }

        .thank-you-card {
            position: relative;
            z-index: 2;
            background: #ffffff;
            padding: 60px 40px;
            border-radius: 24px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.08);
            max-width: 600px;
            width: 100%;
        }

        .success-icon-wrap {
            width: 90px;
            height: 90px;
            background: #e6f9f6;
            color: #10b981;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 30px;
            animation: scaleIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.2);
        }

        @keyframes scaleIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .thank-you-card h1 {
            font-size: 34px;
            font-weight: 700;
            color: #111827;
            margin-bottom: 15px;
        }

        .thank-you-card p {
            font-size: 16px;
            color: #4b5563;
            margin-bottom: 35px;
            line-height: 1.6;
        }

        .btn-home {
            background: #2563eb !important;
            color: #fff !important;
            padding: 14px 32px;
            border-radius: 12px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .btn-home:hover {
            background: #1d4ed8 !important;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.3);
        }
    </style>
</head>
<body>

    <section class="thank-you-section">
        <div class="thank-you-card">
            <div class="success-icon-wrap">
                <i class="fa-solid fa-check"></i>
            </div>
            <h1>Message Sent Successfully!</h1>
            <p>Thank you for reaching out. I have received your request and will get back to you within 24 hours with a personalized strategy.</p>
            
            <a href="index.html" class="btn-home">
                <i class="fa-solid fa-arrow-left"></i> Back to Homepage
            </a>
        </div>
    </section>

</body>
</html>
